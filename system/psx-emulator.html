<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>PlayStation Emulator</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #emulator-container {
            width: 100%;
            height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #emulator-canvas {
            width: 100%;
            height: 100%;
            background: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 8px 16px;
            background: #0078D4;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #005A9E;
        }
        .info {
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="emulator-container">
        <div class="controls">
            <button onclick="loadROM()">Load ROM</button>
            <button onclick="resetEmulator()">Reset</button>
            <span class="info" id="rom-info">No ROM loaded</span>
        </div>
        <canvas id="emulator-canvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pcsx-js@1.0.0/pcsxjs.min.js"></script>
    <script>
        let emulator = null;
        let running = false;
        const canvas = document.getElementById('emulator-canvas');

        function resizeCanvas() {
            const container = document.getElementById('emulator-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight - 60;
        }

        function initEmulator() {
            try {
                emulator = new window.PCSX({
                    canvas: canvas,
                    onReady: () => {
                        running = true;
                        gameLoop();
                    }
                });
            } catch (e) {
                alert('PlayStation emulator not available: ' + e.message);
            }
        }

        function loadROM() {
            try {
                const romSession = sessionStorage.getItem('rom_data');
                if (romSession) {
                    const data = JSON.parse(romSession);
                    loadROMData(data.content, data.name);
                    return;
                }

                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.iso,.bin,.cue';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        loadROMData(event.target.result, file.name);
                    };
                    reader.readAsArrayBuffer(file);
                };
                input.click();
            } catch (e) {
                alert('Error loading ROM: ' + e.message);
            }
        }

        function loadROMData(data, name) {
            try {
                if (!emulator) initEmulator();
                if (emulator && emulator.loadROM) {
                    emulator.loadROM(data);
                    document.getElementById('rom-info').textContent = `Loaded: ${name}`;
                }
            } catch (e) {
                alert('Error loading ROM: ' + e.message);
            }
        }

        function resetEmulator() {
            if (emulator && emulator.reset) {
                emulator.reset();
            }
        }

        function gameLoop() {
            if (running && emulator && emulator.frame) {
                emulator.frame();
                requestAnimationFrame(gameLoop);
            }
        }

        const keyMap = {
            'ArrowUp': 'up',
            'ArrowDown': 'down',
            'ArrowLeft': 'left',
            'ArrowRight': 'right',
            'z': 'cross',
            'x': 'circle',
            'a': 'square',
            's': 'triangle',
            'q': 'l1',
            'w': 'r1',
            'e': 'l2',
            'r': 'r2',
            'Enter': 'start',
            'Shift': 'select'
        };

        document.addEventListener('keydown', (e) => {
            const button = keyMap[e.key];
            if (button && emulator && emulator.buttonDown) {
                emulator.buttonDown(button);
            }
        });

        document.addEventListener('keyup', (e) => {
            const button = keyMap[e.key];
            if (button && emulator && emulator.buttonUp) {
                emulator.buttonUp(button);
            }
        });

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        initEmulator();
    </script>
</body>
</html>
