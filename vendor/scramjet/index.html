<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scramjet</title>
  <style>
    body { margin: 0; background: #0f1115; color: #f5f5f5; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    .bar { display: flex; gap: 10px; align-items: center; padding: 10px 12px; background: #181c23; border-bottom: 1px solid #2a3240; }
    .bar input { flex: 1; padding: 9px 12px; border-radius: 8px; border: 1px solid #2f3a4d; background: #0c0f14; color: #fff; outline: none; }
    .bar button { border: 0; border-radius: 8px; padding: 9px 12px; cursor: pointer; background: #2b6cff; color: #fff; font-weight: 600; }
    .bar button:hover { filter: brightness(1.05); }
    #status { font-size: 12px; color: #b7c0d1; max-width: 40vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    iframe { flex: 1; width: 100%; border: 0; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <strong>Scramjet</strong>
    <input id="url" placeholder="https://example.com" value="https://example.com" />
    <button id="go">Go</button>
    <span id="status">Loading…</span>
  </div>
  <iframe id="frame" title="Scramjet frame"></iframe>

  <script src="./libcurl-transport.js"></script>
  <script src="./scramjet_bundled.js"></script>
  <script src="./controller.api.js"></script>
  <script src="./app.js"></script>
</body>
</html>
