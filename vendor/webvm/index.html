<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebVM placeholder</title>
  <style>
    body { margin: 0; background: #101010; color: #ececec; font-family: "Segoe UI", sans-serif; display: grid; place-items: center; min-height: 100vh; }
    .card { width: min(760px, 92vw); background: #1b1b1b; border: 1px solid #2f2f2f; border-radius: 12px; padding: 20px; }
    h2 { margin: 0 0 10px 0; font-size: 18px; }
    p { margin: 0 0 8px 0; color: #c8c8c8; line-height: 1.45; }
    a { color: #60cdff; }
  </style>
</head>
<body>
  <div class="card">
    <h2>WebVM not built yet</h2>
    <p>This path is reserved for a self-hosted WebVM build.</p>
    <p>Run the GitHub Pages workflow to auto-build and publish WebVM assets into <code>vendor/webvm</code>.</p>
    <p>If you need immediate access, open <a href="https://webvm.io/" target="_blank" rel="noopener noreferrer">webvm.io</a>.</p>
  </div>
</body>
</html>
