<html lang="en-us">
<base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/recoil/">
<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>Recoil Unblocked </title>
	<meta name="description" content="">
	<meta name="google" content="notranslate">
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<link rel="stylesheet" href="webapp/fancade.css">
	<link rel="icon" href="webapp/favicon.ico">
	<script src="patch/poki-sdk.js"></script>
</head>

<body id="body">
	<div id="modal_parent">
		<div id="modal_content"><span id="modal_close_button">&times;</span>
			<div id="store_link_modal_content" class="modal_inner"></div>
			<div id="share_file_modal_content" class="modal_inner"></div>
		</div>
	</div>
	<div id="canvas_border" class="emscripten_border">
		<div id="play_content" class="middle center">
			<div class="edge">
				<div class="box">
					<div class="black"><img src="webapp/cover.jpg" class="cover">
						<p class="title">Recoil</p>
						<p class="author">Martin Magni</p>
					</div>
				</div>
			</div>
			<div id="progress_or_play"><progress id="progress" class="loading" value="0" max="100"></progress></div>
			<p class="description"></p>
		</div><canvas class="emscripten" id="canvas" tabindex="-1"></canvas>
		<div id="gradient"></div>
		<div id="webview_content"></div>
	</div>
	<script type="text/javascript" src="webapp/source_min.js" crossorigin="anonymous"></script>
	<script type="text/javascript" src="webapp/index.js" crossorigin="anonymous"></script>
    <!-- Eruda Inspector Button -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
    eruda.init();
    eruda.hide();
    
    const inspectBtn = document.createElement('button');
    inspectBtn.textContent = 'Inspect';
    inspectBtn.style.cssText = `
        position: fixed;
        bottom: 16px;
        right: 16px;
        padding: 8px 16px;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 6px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        z-index: 999999;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    `;
    inspectBtn.onmouseover = () => inspectBtn.style.background = '#4f46e5';
    inspectBtn.onmouseout = () => inspectBtn.style.background = '#6366f1';
    inspectBtn.onclick = () => eruda.show();
    
    document.body.appendChild(inspectBtn);
</script>
</body>

</html>
