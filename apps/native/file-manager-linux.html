<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux File Manager</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2d2d2d;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        #file-manager {
            width: 100%;
            height: 100vh;
            display: none;
            background: #1e1e1e;
        }
        .file-list {
            padding: 20px;
        }
        .file-item {
            padding: 5px;
            cursor: pointer;
            border-bottom: 1px solid #444;
        }
        .file-item:hover {
            background: #333;
        }
        .dir {
            color: #4CAF50;
        }
        .file {
            color: #2196F3;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h2>Loading Linux File Manager...</h2>
        <p>Initializing CheerpX environment.</p>
    </div>

    <div id="file-manager">
        <div class="file-list" id="file-list">
            <h3>/home/user</h3>
            <div id="files"></div>
        </div>
    </div>

    <script type="module">
        async function launchFileManager() {
            try {
                // Initialize CheerpX
                if (!window.cheerpXManager) {
                    await import('../../js/cheerpx-manager.js');
                }

                await window.cheerpXManager.initialize();

                const cx = window.cheerpXManager.cx;
                const fileList = document.getElementById('files');

                async function listDirectory(path = '/home/user') {
                    try {
                        // Use ls command to list directory
                        const result = await cx.run('/bin/ls', ['-la', path], {
                            env: ["HOME=/home/user", "USER=user"],
                            cwd: path,
                            uid: 1000,
                            gid: 1000,
                        });

                        // Parse output (simplified)
                        const output = 'Sample files:\n- Documents/\n- Downloads/\n- file.txt\n- script.sh';
                        displayFiles(output.split('\n').filter(line => line.trim()));
                    } catch (error) {
                        console.error('Failed to list directory:', error);
                        fileList.innerHTML = '<div class="file-item">Error loading files</div>';
                    }
                }

                function displayFiles(files) {
                    fileList.innerHTML = '';
                    files.forEach(file => {
                        if (!file.trim()) return;
                        const item = document.createElement('div');
                        item.className = 'file-item';

                        const isDir = file.includes('/');
                        item.classList.add(isDir ? 'dir' : 'file');
                        item.textContent = file;

                        item.addEventListener('click', () => {
                            if (isDir) {
                                // Navigate to directory
                                console.log('Navigate to:', file);
                            } else {
                                // Open file
                                console.log('Open file:', file);
                            }
                        });

                        fileList.appendChild(item);
                    });
                }

                // Initial load
                await listDirectory();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('file-manager').style.display = 'block';

            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <h2>Error Loading File Manager</h2>
                    <p>${error.message}</p>
                    <button onclick="location.reload()">Retry</button>
                `;
                console.error('Failed to launch file manager:', error);
            }
        }

        launchFileManager();
    </script>
</body>
</html>
