<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coding Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        #ai-interface {
            width: 100%;
            height: 100vh;
            display: none;
            position: relative;
        }
        #model-selector {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: #333;
            padding: 10px;
            border-radius: 5px;
        }
        #model-selector select {
            padding: 5px;
            background: #555;
            color: white;
            border: 1px solid #777;
            border-radius: 3px;
        }
        #ai-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #code-editor {
            position: absolute;
            top: 60px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background: #2d2d2d;
            border-radius: 5px;
            padding: 10px;
            display: none;
        }
        #code-input {
            width: 100%;
            height: 200px;
            background: #1e1e1e;
            color: white;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }
        .button-group {
            margin-top: 10px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            margin-right: 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        #output {
            margin-top: 10px;
            padding: 10px;
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 3px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            max-height: 200px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h2>Loading AI Coding Assistant...</h2>
        <p>Initializing BrowserCode with Gemini support.</p>
    </div>

    <div id="ai-interface">
        <div id="model-selector">
            <label for="model-select">AI Model:</label>
            <select id="model-select">
                <option value="gemini">Gemini</option>
                <option value="claude">Claude</option>
            </select>
        </div>

        <iframe id="ai-iframe" src="https://browsercode.io/"></iframe>

        <div id="code-editor">
            <h3>Code Editor</h3>
            <textarea id="code-input" placeholder="Paste your code here..."></textarea>
            <div class="button-group">
                <button id="debug-btn">Debug Code</button>
                <button id="optimize-btn">Optimize Code</button>
                <button id="explain-btn">Explain Code</button>
                <button id="run-btn">Run Code</button>
            </div>
            <div id="output"></div>
        </div>
    </div>

    <script type="module">
        async function launchAICoding() {
            try {
                // Initialize BrowserCode manager
                if (!window.browserCodeManager) {
                    await import('../../js/browsercode-manager.js');
                }

                await window.browserCodeManager.initialize();

                // Set up model selector
                const modelSelect = document.getElementById('model-select');
                modelSelect.value = window.browserCodeManager.getModel();
                modelSelect.addEventListener('change', () => {
                    window.browserCodeManager.setModel(modelSelect.value);
                });

                // Set up code editor buttons
                setupCodeEditor();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('ai-interface').style.display = 'block';

            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <h2>Error Loading AI Assistant</h2>
                    <p>${error.message}</p>
                    <button onclick="location.reload()">Retry</button>
                `;
                console.error('Failed to launch AI coding assistant:', error);
            }
        }

        function setupCodeEditor() {
            const codeInput = document.getElementById('code-input');
            const output = document.getElementById('output');

            document.getElementById('debug-btn').addEventListener('click', async () => {
                const code = codeInput.value;
                if (!code.trim()) return;

                output.textContent = 'Debugging code...';
                try {
                    const result = await window.browserCodeManager.debugCode(code, 'No error provided');
                    output.textContent = result;
                } catch (error) {
                    output.textContent = `Error: ${error.message}`;
                }
            });

            document.getElementById('optimize-btn').addEventListener('click', async () => {
                const code = codeInput.value;
                if (!code.trim()) return;

                output.textContent = 'Optimizing code...';
                try {
                    const result = await window.browserCodeManager.codeWithAI(code, 'javascript');
                    output.textContent = result;
                } catch (error) {
                    output.textContent = `Error: ${error.message}`;
                }
            });

            document.getElementById('explain-btn').addEventListener('click', async () => {
                const code = codeInput.value;
                if (!code.trim()) return;

                output.textContent = 'Analyzing code...';
                try {
                    const result = await window.browserCodeManager.codeWithAI(`Explain this code:\n${code}`, 'javascript');
                    output.textContent = result;
                } catch (error) {
                    output.textContent = `Error: ${error.message}`;
                }
            });

            document.getElementById('run-btn').addEventListener('click', async () => {
                const code = codeInput.value;
                if (!code.trim()) return;

                output.textContent = 'Running code...';
                try {
                    // This would integrate with CheerpX to run the code
                    if (window.cheerpXManager) {
                        await window.cheerpXManager.runNativeApp('/bin/bash', ['-c', `node -e "${code.replace(/"/g, '\\"')}"`]);
                        output.textContent = 'Code executed successfully';
                    } else {
                        output.textContent = 'CheerpX not available for code execution';
                    }
                } catch (error) {
                    output.textContent = `Execution error: ${error.message}`;
                }
            });
        }

        launchAICoding();
    </script>
</body>
</html>
