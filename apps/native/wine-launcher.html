<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Launcher</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
        }
        #loading {
            text-align: center;
            margin-top: 50px;
        }
        #wine-interface {
            display: none;
        }
        .upload-area {
            border: 2px dashed #666;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            border-radius: 5px;
            transition: border-color 0.3s;
        }
        .upload-area:hover {
            border-color: #4CAF50;
        }
        .upload-area.dragover {
            border-color: #2196F3;
            background: rgba(33, 150, 243, 0.1);
        }
        #file-input {
            display: none;
        }
        .exe-list {
            margin-top: 20px;
        }
        .exe-item {
            background: #333;
            padding: 10px;
            margin: 5px 0;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .exe-item:hover {
            background: #444;
        }
        .run-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .run-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h2>Loading Wine Launcher...</h2>
        <p>Initializing CheerpX Linux environment with Wine support.</p>
    </div>

    <div id="wine-interface">
        <h1>Wine Launcher</h1>
        <p>Upload and run Windows .exe files using Wine on Linux.</p>

        <div class="upload-area" id="upload-area">
            <p>Drag & drop .exe files here or click to browse</p>
            <button onclick="document.getElementById('file-input').click()">Browse Files</button>
            <input type="file" id="file-input" accept=".exe" multiple>
        </div>

        <div class="exe-list">
            <h3>Uploaded EXE Files:</h3>
            <div id="exe-list"></div>
        </div>
    </div>

    <script type="module">
        let uploadedFiles = [];

        async function launchWineLauncher() {
            try {
                // Initialize CheerpX
                if (!window.cheerpXManager) {
                    await import('../../js/cheerpx-manager.js');
                }

                await window.cheerpXManager.initialize();

                // Set up file upload
                setupFileUpload();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('wine-interface').style.display = 'block';

            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <h2>Error Loading Wine Launcher</h2>
                    <p>${error.message}</p>
                    <button onclick="location.reload()">Retry</button>
                `;
                console.error('Failed to launch Wine launcher:', error);
            }
        }

        function setupFileUpload() {
            const uploadArea = document.getElementById('upload-area');
            const fileInput = document.getElementById('file-input');

            // Drag and drop
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = Array.from(e.dataTransfer.files).filter(file => file.name.endsWith('.exe'));
                handleFiles(files);
            });

            // File input
            fileInput.addEventListener('change', (e) => {
                const files = Array.from(e.target.files);
                handleFiles(files);
            });
        }

        async function handleFiles(files) {
            for (const file of files) {
                if (file.name.endsWith('.exe')) {
                    uploadedFiles.push(file);
                    await window.cheerpXManager.fileSystemBridge.uploadFile(file);
                    addExeToList(file);
                }
            }
        }

        function addExeToList(file) {
            const exeList = document.getElementById('exe-list');
            const item = document.createElement('div');
            item.className = 'exe-item';
            item.innerHTML = `
                <span>${file.name}</span>
                <button class="run-btn" onclick="runExe('${file.name}')">Run with Wine</button>
            `;
            exeList.appendChild(item);
        }

        async function runExe(fileName) {
            try {
                await window.cheerpXManager.runWine(new File([], fileName)); // Simplified
                alert(`${fileName} launched with Wine!`);
            } catch (error) {
                alert(`Failed to run ${fileName}: ${error.message}`);
                console.error('Failed to run EXE:', error);
            }
        }

        // Make runExe global
        window.runExe = runExe;

        launchWineLauncher();
    </script>
</body>
</html>
